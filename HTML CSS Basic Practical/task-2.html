<!DOCTYPE html>
<html>
<head>
    <title> Style a Button </title>
    <style>
        .button-1 {
            background-color: #008cba;
            color: white;
            padding: 15px;
            width : 200px;
            font-size: 16px;
            border-radius: 2px;
            cursor: pointer;
        }

        .button-2 {
            background-color: #09d224;
            color: white;
            padding: 15px;
            font-size: 16px;
            width : 200px;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.5s;
        }

        .button-2:hover {
            background-color: #11cbd5;
        }
    </style>
</head>
<body>
    <h1> Style a button </h1>

    <button class="button-1">Button - 1</button>
    <br>
    <br>
    <button class="button-2">Hover Button - 2</button>
</body>
</html>
