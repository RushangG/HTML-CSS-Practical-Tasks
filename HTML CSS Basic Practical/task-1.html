<!DOCTYPE html>
<html>
<head>
    <title>Simple Webpage Layout</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: #d69040;
            color: white;
            padding: 20px;
            text-align: center;
        }

        nav {
            background-color: #645252;
        }

        nav ul {
            list-style-type: none;
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: left;
        }
        
        nav ul li a {
            margin: 0 15px;
            text-decoration: none;
            color: white;
            font-size: 18px;
        }

        nav ul li a:hover {
            color: #d69040;
        }

        main {
            padding: 20px;
        }

        .home {
            background-color: #9fb211;
            color: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 5px;
        }

        .about {
            background-color: #d69040;
            color: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 5px;
        }

        .contact {
            background-color: #645252;
            color: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 5px;
        }

        footer {
            background-color: #d69040;
            color: white;
            padding: 15px;
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <h1>Welcome to My Website</h1>
    </header>

    <nav>
        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <main>
        <section id="home" class="home">
            <h2>Home</h2>
            <p>This is the home section of the webpage.</p>
        </section>

        <section id="about" class="about">
            <h2>About</h2>
            <p>This section contains information about the website.</p>
        </section>

        <section id="contact" class="contact">
            <h2>Contact</h2>
            <p>This section provides contact information.</p>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 My Website. All rights reserved.</p>
    </footer>

</body>
</html>
