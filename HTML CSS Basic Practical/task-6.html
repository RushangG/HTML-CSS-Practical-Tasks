<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Add a Background Image </title>
    <style>
        body {
            background-image: url('https://images.unsplash.com/photo-1482784160316-6eb046863ece?q=80&w=870&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed; 
            
        }

        h1 , p {
            background-color: azure;
            color: rgb(1, 1, 0);
            font-size: 30px;
            border: 1px solid black;
            padding: 10px;
            margin: 30px;
            width: 450px; 

        }


      
    
    </style>
</head>
<body>

   
    <h1> Add a Background Image </h1>
    <p>
        Properties used to control the background of an element, such as background-image, background-size, 
        and background-position.
    </p>
    
</body>
</html>
