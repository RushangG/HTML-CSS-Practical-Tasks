<!DOCTYPE html>
<html>
<head>
    <title>Simple Webpage Layout</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #d69040;
            padding: 20px;
            text-align: center;
        }

        nav {
            flex-direction: row;
            background-color: #645252;
            overflow: hidden;
        }

        nav ul {
            list-style-type: none;
            font-size: 20px;
            margin: 10px;
            padding: 10px;
            display: flex;
        }
        
        nav ul li a {
            margin: 0 10px;
            text-decoration: none;
            color: #fff;
        }

        nav ul li a:hover {
            background-color: #ddd;
            color: black;
        }


      
        footer {
            background-color: #d69040;
            padding: 10px;
            text-align: center;
            position: fixed;
            bottom: 0;
            width: 100%;
        }

        .home {
            background-color: #9fb211;
            padding: 20px;
            flex: left;
           
        }

        .about {
            background-color: #d69040;
            padding: 20px;
            flex: top right;
        }

        .contact {
            background-color: #645252;
            padding: 20px;
            flex: bottom right;
        }
      
    </style>
</head>
<body>
    <header>
        <h1>Welcome to My Website</h1>
    </header>

    <nav>
        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <main>
        <section id="home" class="home">
            <h2>Home</h2>
            <p>This is the home section of the webpage.</p>
        </section>

        <section id="about" class="about">
            <h2>About</h2>
            <p>This section contains information about the website.</p>
        </section>

        <section id="contact" class="contact">
            <h2>Contact</h2>
            <p>This section provides contact information.</p>
        </section>
    </main>

    <footer>
        <p>2026 My Website. All rights reserved.</p>
    </footer>



</body>
</html>
