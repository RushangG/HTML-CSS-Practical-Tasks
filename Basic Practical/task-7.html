<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create a Card Component</title>

    <style>
       
        .card {
            border: 1px solid #ccc;
            border-radius: 2px;
            max-width: 300px;
            background-color: white;
            margin: 20px auto;
        }

        .card img {
            width: 100%;
            height: 200px;
        }

        .card h2 {
            margin: 15px;
            font-size: 22px;
            color: #333;
        }

        .card p {
            margin: 10px 15px;
            color: #666;
            font-size: 15px;
        }

        .card button {
            margin: 15px;
            padding: 10px;
            background-color: #007bff;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .card button:hover {
            background-color: #39516b;
        }
    </style>
</head>
<body>

    <h1> Design a card component  Product Card</h1>
    
    <div class="card">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTlnRLr8vJ8TNXqZIQRW8LGoGft1wnBT7sBd7LbZn4HFw&s=10" alt="Laptop Image">
        
        <h2> lenovo gaming laptop </h2>
        <p>
            lenovo laptop best gaming performence and best processor for gaming laptops and 
            best graphics card for gaming.
        </p>

        <p>
            price : 65,000 RS.
        </p>
        <button>Add to cart</button>

    </div>
    
</body>
</html>
