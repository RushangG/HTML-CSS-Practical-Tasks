<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Navigation Bar</title>
    <style>
   

        .navbar {
            background-color: #333;
        }

        .navbar > ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
        }

        .navbar ul li {
            position: relative;
        }

        .navbar a {
            display: block;
            color: white;
            padding: 15px 20px;
            text-decoration: none;
        }

        .navbar a:hover, .dropdown:hover .drop-button {
            background-color: #555;
        }

        .dropdown-menu {
            display: none;
            position: absolute;
            list-style: none;
            top: 100%;
            left: 0;
            background-color: #333;
            min-width: 160px;
            padding: 0;
        }

        .dropdown-menu li {
            width: 100%;
        }

        .dropdown-menu a {
            padding: 10px 15px;
        }

        .dropdown:hover .dropdown-menu {
            display: block;
        }
        
        .content {
            padding: 40px 20px;
            text-align: center;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li class="dropdown">
                <a href="#" class="drop-button">Services &#9662;</a>
                <ul class="dropdown-menu">
                    <li><a href="#">Services-1</a></li> 
                    <li><a href="#">Services-2</a></li>
                    <li><a href="#">Services-3</a></li>
                </ul>
            </li>
            <li class="dropdown">
                <a href="#" class="drop-button">Products &#9662;</a>
                <ul class="dropdown-menu">
                    <li><a href="#">Products-1</a></li>
                    <li><a href="#">Products-2</a></li>
                    <li><a href="#">Products-3</a></li> 
                </ul>
            </li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <div class="content">
        <h1>Welcome to Our Website</h1>
        <p>Hover over the "Services" or "Products" links in the navigation bar above to view the interactive dropdown menus.</p>
    </div>

</body>
</html>
