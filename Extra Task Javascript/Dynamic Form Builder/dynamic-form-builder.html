<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Form Builder</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>
            Dynamic Form Builder
        </h1>

    </header>

    <div class="create-button">
        <button type="button" id="add-button"> Create New Form </button>
    </div>

    <main>

       <!-- dynamic form   -->
        <div id="input-form">
            <h2>Input Form</h2>
            <form action="#" id="dynamic-form">

                <div id="fields-container"></div>

                <br>
                <div>
                    <button type="submit" id="submit-button">submit</button>
                </div>

            </form>
        </div>

        <br>
       <!-- form builder -->
        <div id="form-builder">
            <h2>Form Builder</h2>
            <div id="message-div"></div>
            <form action="#" id="input-field">
                <div>
                    <br>
                    <label for="input-type">Input Type : </label>
                    <select name="input-type" id="input-type" required>
                        <option value="text">Text</option>
                        <option value="number">Number</option>
                        <option value="email">Email</option>
                        <option value="textarea">Text Area</option>
                        <option value="password">Password</option>
                        <option value="checkbox">Checkbox</option>
                        <option value="radio">Radio</option>
                        <option value="date">Date</option>
                        <option value="datetime-local">Datetime Local</option>
                        <option value="time">Time</option>
                        <option value="week">Week</option>
                        <option value="month">Month</option>
                        <option value="url">Url</option>
                        <option value="color">Color</option>


                    </select>
                    <br><br>

                    <label for="label-name">Label Name : </label>
                    <input type="text" name="label" id="label-name" placeholder="Enter Label" required>
                    <br><br>
                    <label for="placeholder-text">Placeholder Text : </label>
                    <input type="text" name="placeholder" id="placeholder-text" placeholder="Enter Placeholder"
                        required>
                    <br>
                    <br>

                </div>
                <button type="submit" id="add-to-form">Add TO Form</button>
            </form>

        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
