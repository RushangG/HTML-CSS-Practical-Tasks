<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator App</title>


    <link rel="stylesheet" href="style.css">

</head>

<body>
    <header>
        <h1>Calculator App</h1>
    </header>

    <main>
        <div class="num1">
            <label for="num1">num1 : </label>
            <input type="number" name="num1" id="num1" placeholder="Enter valid number">
        </div>

        <div class="num1">
            <label for="num2">num2 : </label>
            <input type="number" name="num2" id="num2" placeholder="Enter valid number">
        </div>

        <button id="sum">+</button>
        <button id="sub">-</button>
        <button id="multi">*</button>
        <button id="divide">/</button>

        <div>
            <p id="result-box"></p>
        </div>


    </main>

    <script src="script.js"></script>
</body>

</html>
