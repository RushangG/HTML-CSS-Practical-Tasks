<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess the Number Game</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>Guess the Number Game</h1>
    </header>

    <main>

        <div id="attempts"></div>
        
        <div id="input-box">
            <label for="number-guess">Enter Your Number Range (1 - 100):</label>
            <br>
            <input type="number" id="number-input" placeholder="Guess the number">

        </div>

        <div id="message"></div>

        <div>
            <button id="submit-button">Submit Guess</button>
        </div>

        <div id="correct-number">
            correct number : ?
        </div>

    </main>

    <script src="script.js"></script>
</body>

</html>
