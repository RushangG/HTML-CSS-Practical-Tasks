<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Interactive Photo Gallery</title>

    <link rel="stylesheet" href="style.css">
</head>


<body>

    <header>
        <h1>Interactive Photo Gallery</h1>
    </header>

    <main>

        <div class="input-image">
            <form id="image-form">
                <label for="image-url">Upload Image URL:</label>
                <input type="text" placeholder="Enter Image URL" id="image-url" required>
                <button type="submit" id="upload-image">Upload Image</button>
            </form>
        </div>



        <div class="gallery-container">

            <!-- dynamically added images -->

            <!-- <div class="gallery-img">
             <span class="delete">&times;</span>
             <img src="https://static.vecteezy.com/system/resources/thumbnails/060/117/855/small/red-rose-is-the-main-focus-of-the-image-with-a-blue-background-and-a-few-other-flowers-in-the-background-the-rose-is-the-most-prominent-and-beautiful-flower-in-the-picture-photo.jpeg"
            alt="img - 3">
             </div> -->

        </div>


        <div id="image-model">

            <span class="close">&times;</span>

            <div id="model-contex"></div>

            <br>

            <div>
                <button id="delete-img">Delete Image</button>
            </div>
        </div>

    </main>

    <script src="script.js"></script>

</body>

</html>
