<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Text Analysis Tool </title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <header>
        <h1> Text Analysis Tool </h1>
    </header>

    <main>
        <div class="input">
            <label for="text-input"> Enter Text for Analysis: </label>
            <textarea id="text-input" placeholder="Enter text here..."></textarea>
        </div>

        <div class="button-container">
            <button id="analyze-button"> Analyze Text </button>
        </div>

        <div class="result">
            <label for="result-output"> Analysis Result: </label>
            <div id="result-output" readonly> </div>
        </div>

    </main>

    <script src="script.js"></script>

</body>

</html>
