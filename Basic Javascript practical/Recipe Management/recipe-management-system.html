<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Recipe Management System </title>


    <link rel="stylesheet" href="style.css">

</head>

<body>

    <h1>Recipe Management System</h1>

    <main>

        <div class="form-container">
            <form action="#" id="recipe-form">

                <label for="recipeName">Recipe Name:</label>
                <input type="text" id="recipeName" name="recipeName" minlength="3" required>
                <br>

                <label for="category">Category:</label>
                <select id="category" name="category" required>
                    <option value="">Select a category</option>
                    <option value="breakfast">Break-Fast</option>
                    <option value="lunch">Lunch</option>
                    <option value="dinner">Dinner</option>

                </select>

                <br>
                <label for="ingredients">Ingredients:</label>
                <textarea id="ingredients" name="ingredients" required></textarea>

                <br>
                <label for="instructions">Instructions:</label>
                <textarea id="instructions" name="instructions" required></textarea>

                <br>

                <button id="button-add" type="submit">Add Recipe</button>

            </form>
        </div>

        <div class="recipe-list">

            <h2>Recipe List</h2>



            <div class="search-box">

                <div>
                    <label for="category">Category:</label>
                    <select id="category-search" name="category-search" onchange="selectCategory()">s
                        <option value="">All Categories</option>
                        <option value="breakfast">Break-Fast</option>
                        <option value="lunch">Lunch</option>
                        <option value="dinner">Dinner</option>
                    </select>
                </div>
                <div>
                    <label for="search-input">Ingredients Search:</label>
                    <input type="text" id="search-input" placeholder="Search recipes..." onkeyup="searchRecipes()">
                </div>
            </div>

            <div id="recipeList">
                <table>
                    <thead>
                        <tr>
                            <th>No.</th>
                            <th>Recipe Name</th>
                            <th>Category</th>
                            <th>Ingredients</th>
                            <th>Instructions</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="recipeListBody">
                        <!-- Recipes will be dynamically added here -->
                    </tbody>
            </div>

        </div>



    </main>

    <script src="script.js"></script>
</body>

</html>
