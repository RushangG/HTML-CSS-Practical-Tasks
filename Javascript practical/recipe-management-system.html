<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Recipe Management System </title>
    
    <style>
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-family: "Times New Roman", serif;
            border-bottom: 2px solid #040503;
            padding-bottom: 10px;
        }

        main{
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            column-gap: 20px;
        }

        
       
        form {
            width: 500px;
            margin: 0;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #f9f9f9;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input[type="text"],
        textarea {
            width: 90%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        select{
            width: 97%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .recipe-list {
            width: 1000px;
            margin: 20px auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #f9f9f9;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: left;
        }

        @media (max-width: 1000px) {
            main {
                flex-direction: column;
                align-items: center;
            }

            form, .recipe-list {
                width: 90%;
            }
        }


    </style>
       



    <script>
        //global variable 
        let editIndex = null; //to keep track edit or add new recipe

         //add recipe to local storage function 
        
        function addRecipe(recipe) {
            //array to store recipes in local storage
            let recipes = JSON.parse(localStorage.getItem('recipes')) || [];
            recipes.push(recipe);
            localStorage.setItem('recipes', JSON.stringify(recipes));
        } 

        function displayRecipes() {

            document.getElementById('button-add').textContent = 'Add Recipe'; 
            const recipeListBody = document.getElementById('recipeListBody');
            if(!recipeListBody) return;  

            recipeListBody.innerHTML = ''; // Clear existing rows

            const recipes = JSON.parse(localStorage.getItem('recipes')) || [];

            if(recipes.length === 0) {
                recipeListBody.innerHTML = `
                <tr>
                    <td colspan="10">
                        No recipes available.
                    </td>
                </tr>`;
                return;
            }

            recipes.forEach((recipe, index) => {
                const recipeRow = document.createElement('tr');

                recipeRow.innerHTML = `
                    <td>${index + 1}</td>
                    <td>${recipe.name}</td>
                    <td>${recipe.category}</td>
                    <td>${recipe.ingredients}</td>
                    <td>${recipe.instructions}</td>
                    <td>
                        <button onclick="editRecipe(${index})">Edit</button>
                        <button onclick="deleteRecipe(${index})">Delete</button>

                    </td>

                `;  
                    recipeListBody.appendChild(recipeRow);


            }) 
         
        }

        function deleteRecipe(index) {


        if (confirm("Are you sure you want to delete this recipe?")) {

            let recipes = JSON.parse(localStorage.getItem('recipes')) || [];
            recipes.splice(index, 1); //remove the recipe at the specified index .splice(index to remove,up to item n);
            localStorage.setItem('recipes', JSON.stringify(recipes));
           
          
                displayRecipes();
            }
            else {
                displayRecipes();
            }
            
           
        }

        function editRecipe(index) {
            let recipes = JSON.parse(localStorage.getItem('recipes')) || [];
          
            const recipe = recipes[index];

            if(!recipe) return; // If recipe doesn't exist, exit the function

            // fill the form with the recipe data
            document.getElementById('recipeName').value = recipe.name;
            document.getElementById('category').value = recipe.category;
            document.getElementById('ingredients').value = recipe.ingredients;
            document.getElementById('instructions').value = recipe.instructions;

            document.getElementById('button-add').textContent = 'Update Recipe';

            // update add exaxt index of the recipe in the array
        
            localStorage.setItem('recipes', JSON.stringify(recipes));
            editIndex = index; // Store the index of the recipe being edited

        }

        document.addEventListener('DOMContentLoaded', displayRecipes);

        document.addEventListener('DOMContentLoaded', function() {

            const form = document.getElementById('recipe-form');

        form.addEventListener('submit', function(event) {
            event.preventDefault();

            const recipeName = document.getElementById('recipeName').value;
            const category = document.getElementById("category").value;
            const ingredients = document.getElementById('ingredients').value;
            const instructions = document.getElementById('instructions').value;

            const recipe = {
                name: recipeName,
                category: category,
                ingredients: ingredients,
                instructions: instructions
            }

            addRecipe(recipe);
            
            displayRecipes();
            

            form.reset();

          })
        });






    </script>

</head>

<body>
    
    <h1>Recipe Management System</h1>
    
    <main>
    
        <div class="form-container">
    <form action="#" id="recipe-form">
        
        <label for="recipeName">Recipe Name:</label>
        <input type="text" id="recipeName" name="recipeName" minlength="3" required>
        <br>

        <label for="category">Category:</label>
        <select id="category" name="category" required>
            <option value="">Select a category</option>
            <option value="breakfast">Break-Fast</option>
            <option value="lunch">Lunch</option>
            <option value="dinner">Dinner</option>

        </select>
        
        <br>
        <label for="ingredients">Ingredients:</label>
        <textarea id="ingredients" name="ingredients" required></textarea>

        <br>
        <label for="instructions">Instructions:</label>
        <textarea id="instructions" name="instructions" required></textarea>

        <br>

        <button id="button-add" type="submit" >Add Recipe</button>

    </form>
    </div>

    <div class="recipe-list">
        <h2>Recipe List</h2>
        <div id="recipeList">
             <table>
                <thead>
                    <tr>
                        <th>No.</th>
                        <th>Recipe Name</th>
                        <th>Category</th>
                        <th>Ingredients</th>
                        <th>Instructions</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="recipeListBody">
                    <!-- Recipes will be dynamically added here -->
                </tbody>
        </div>

    </div>

    

    </main>
 

</body>

</html>
