<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Management Application</title>

    <style>
        html {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #ebebeb;
        }

        main {
            display: flex;
            justify-content: space-around;
            align-items: flex-start;
            padding: 20px;
        }

        .form-container {
            width: 30%;
            margin: 0;
            padding: 20px;
            background-color: #fff;
            border-radius: 5px;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 5px;
            font-weight: bold;
        }

        textarea {
            margin-bottom: 10px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            resize: vertical;
            height: 100px;

        }

        select {
            margin-bottom: 10px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            margin-top: 30px;
            padding: 10px;
            background-color: #e98a50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #c39c5e;
        }

        .task-list {
            width: 60%;
            margin: 0;
            background-color: #fff;
            border-radius: 5px;


        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #fff;
            border-radius: 5px;
            border: 1px solid #ddd;


        }

        .table-container {
            max-height: 500px;
            overflow-y: auto;
        }

        .table-header {
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: space-between;
            display: flex;
            padding: 10px;
            background-color: #cd9375;
            border-bottom: 2px solid #ddd;
        }

        .table-header h2 {
            margin-left: 5px;
            
           


        }
        .filter-container {
            margin-top: 15px;
            margin-right: 10px;
            text-align: right;
        }



        table th {
            position: sticky;
            height: 50px;
            margin-top: 0;
            border-bottom: 2px solid #b8b4b4;
            top: 0;
            background-color: #fff;
            z-index: 0;
        }

        .edit-button {
            padding: 5px 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .delete-button {
            padding: 5px 10px;
            background-color: #f44336;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        td,
        th {
            border: 1px solid #ddd;
            padding: 5px;
            text-align: center;
        }


        @media (max-width: 768px) {
            main {
                margin: 30px;
                padding: 10px;
                flex-direction: column;
            }

            .form-container,
            .task-list {
                width: 100%;
                margin-bottom: 20px;
            }
        }
    </style>

    <script>

        async function getLocalStorageTasks() {
            const tasks = JSON.parse(localStorage.getItem('tasks')) || [];
            return tasks;
        }
        async function setLocalStorageTasks(tasks) {
            localStorage.setItem('tasks', JSON.stringify(tasks));
        }

        // add function , task add to local storage
        async function addTask(task) {

            const tasks = await getLocalStorageTasks();
            tasks.push(task);
            await setLocalStorageTasks(tasks);
            showTasks();
        }

        async function showTasks(filtertasks = null) {
            const allTasks = await getLocalStorageTasks();
            const tableBody = document.getElementById('table-body');

            document.getElementById('add-task-button').textContent = 'Add Task';


            tableBody.innerHTML = '';


            const tasks = filtertasks !== null ? filtertasks : allTasks;

            if (tasks.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="4" style="text-align:center;">No tasks available</td></tr>';
                return;
            }

            tasks.forEach((task, index) => {
                const taskRow = document.createElement('tr');

                taskRow.innerHTML = `
                    <td>${index + 1}</td>
                    <td>${task.description}</td>
                    <td>${task.status}</td>
                    <td>
                        <button class="edit-button" onclick="editTask(${task.id} )">Edit</button>
                        <button class="delete-button" onclick="deleteTask(${task.id})">Delete</button>
                    </td> 

                `;
                tableBody.appendChild(taskRow);

            });
        }

        //delete task function
        async function deleteTask(id) {

            const confirmed = confirm('Are you sure you want to delete this task?');
            if (!confirmed) return;

            const tasks = await getLocalStorageTasks();
            tasks.forEach((task, index) => {
                if (task.id === id) {
                    tasks.splice(index, 1);
                }
            });
            await setLocalStorageTasks(tasks);
            showTasks();
             document.getElementById('add-task-button').removeAttribute('data-edit-id');
        }

        //edit task function
        async function editTask(id) {


            const tasks = await getLocalStorageTasks();
            const taskToEdit = tasks.find(task => task.id === id);

            if (!taskToEdit) {
                alert('Task not found.');
                return;
            }

            document.getElementById('task-description-id').value = taskToEdit.description;
            document.getElementById('task-status').value = taskToEdit.status;

            document.getElementById('add-task-button').textContent = 'Update task';
            document.getElementById('add-task-button').dataset.editId = id;

        }

        //filter task by status 
        async function filterTasksByStatus(status) {


            const tasks = await getLocalStorageTasks();
            const filteredTasks = status === 'all' ? tasks : tasks.filter(task => task.status === status);


            showTasks(filteredTasks);

        }




        document.addEventListener('DOMContentLoaded', () => {

            showTasks();

            document.getElementById('status-filter').addEventListener('change', async (event) => {

                const status = event.target.value;
                filterTasksByStatus(status);


            });

            document.getElementById('add-task-button').addEventListener('click', async (event) => {


                event.preventDefault();


                const taskDescription = document.getElementById('task-description-id').value;
                const taskStatus = document.getElementById('task-status').value;

                if (taskDescription.trim() === '') {
                    alert('Task description cannot be empty.');
                    return;
                }

                const editId = document.getElementById('add-task-button').dataset.editId;
                //update logic
                if (editId) {


                    const tasks = await getLocalStorageTasks();
                    const taskIndex = tasks.findIndex(task => task.id === parseInt(editId));
                    tasks[taskIndex].description = taskDescription;
                    tasks[taskIndex].status = taskStatus;

                    await setLocalStorageTasks(tasks);
                    showTasks();

                }
                else {
                    // add new task logic
                    const id = Date.now();

                    const task = {
                        id: id,
                        description: taskDescription,
                        status: taskStatus
                    };

                    await addTask(task);
                }
                document.getElementById('task-description-id').value = '';
                document.getElementById('task-status').value = 'in-complete';
                document.getElementById('add-task-button').textContent = 'Add Task';
                document.getElementById('add-task-button').removeAttribute('data-edit-id');



            })

        });

    </script>
</head>

<body>
    <header>
        <h1>Task Management Application</h1>
    </header>

    <main>
        <div class="form-container">
            <form class="task-form" action="#">
                <label for="task-description">Task description</label>
                <textarea id="task-description-id" name="task-description"
                    placeholder="Enter task description"></textarea>

                <label for="task-status">Task status</label>
                <select id="task-status" name="task-status">
                    <option value="in-complete">InComplete</option>
                    <option value="completed">Completed</option>
                </select>

                <button type="submit" id="add-task-button">Add Task</button>
            </form>
        </div>



        <div class="task-list">
            <div class="table-header">
                <div>
                <h2>Task List : </h2>
                </div> 
                <div class="filter-container">
                    <label for="task-status">Status:</label>
                    <select id="status-filter">
                        <option value="all">All</option>
                        <option value="in-complete">InComplete</option>
                        <option value="completed">Completed</option>
                    </select>
                </div>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Task Number</th>
                            <th>Task Description</th>
                            <th>Task Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="task-table-body">
                        <!-- task data will be dynamically add here. -->
                    </tbody>

                </table>
            </div>    
        </div>

    </main>

</body>

</html>
