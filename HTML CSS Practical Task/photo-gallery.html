<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Responsive Photo Gallery</title>

    <style>
        
        h1 { 
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-family: "Times New Roman", serif;
            border-bottom: 2px solid #040503;
            padding-bottom: 10px;
        }

        .gallery-container {
            column-count: 3;
            column-gap: 3px;
            max-width: 1000px;
            margin: 0 auto;
        }


        .gallery-container img {
            display: inline-block;
            width: 100%;
            margin-bottom: 3px;
            height: auto;
            transition: transform 0.5s;
            cursor: pointer;
        }

        .gallery-container img:hover {
            transform: scale(1.05);
        }


        @media (max-width: 900px) {
            .gallery-container {
                column-count: 2;
                column-gap: 3px;
            }

            .gallery-container img {
                margin-bottom: 3px;
            }
        }

        @media (max-width: 600px) {
            .gallery-container {
                column-count: 1;
                column-gap: 0;
            }
        }
    </style>
</head>
