<!DOCTYPE html>
<html>
<head>

    <title>Registration Form</title>

</head>
<body>
    
    <form action="task-7.html">
        
    <h1>Registration Form</h1>
    <hr>

    <div>
        <label for="f-name"><b>Fulll Name: </b></label>
        <input type="text" name="f-name" id="f-name"   placeholder="Enter Full Name" required>
    </div>
    <br>

    <div>
         <label for="email"><b>E-Mail: </b></label>
         <input type="text" name="email" id="email" placeholder="Enter Email" required>
    </div>
    <br>

    <div>
        <label for="password"><b>Password: </b></label>
        <input type="password" name="password" id="password" placeholder="" required>
    </div>
    <br>

    <div>
        <label for="confirm-password"><b>Confirm Password: </b></label>
        <input type="password" name="confirm-password" id="confirm-password" placeholder="" required>
    </div>

    <br>
      
    <div>
         <label for="gender"><b>Gender: </b></label>
            
            <input type="radio" name="gender" id="male" value="Male">
            <label for="male">Male</label>
          
            <input type="radio" name="gender" id="female" value="Female">
            <label for="female">Female</label>
    
    </div>

    <br>

    <div>
            <label for="hobbies"><b>Hobbies:</b></label>

            <input type="checkbox" id="sports" name="sports" value="sports">
            <label for="sports">Sports</label>

            <input type="checkbox" id="traveling" name="traveling" value="traveling">
            <label for="traveling">Traveling</label>

            <input type="checkbox" id="coding" name="coding" value="coding">
            <label for="coding">Coding</label>

            

    </div>
    <br>

    <div>

            <label for="country"><b>Select Country: </b></label>

            <select name="country" id="country">
                <option value="" disabled selected>Select Country</option>
                <option value="IN">India</option>
                <option value="CA">Canada</option>
                <option value="GB">United Kingdom</option>
            </select>

    </div>
    <br>
    <br>
    

    <button type="submit"> Submit </button>
    <hr>
    </form>
</body>
</html>
