<!DOCTYPE html>
<html>
<head>
    <title>Chessboard Layout</title>
    <style>
        .chessboard-layout{
            background-color: rgb(254, 254, 253);
            width: 400px;
            height: 400px;
            border: 5px solid rgb(51, 25, 21);
            position: fixed;

        }

        .square{
            float: left;
            width: 50px;
            height: 50px;
        }


        .white{
            background-color: white;
           
        }

        .black{

            background-color: black;
           
        }

    </style>
</head>
