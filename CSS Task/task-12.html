<!DOCTYPE html>
<html>
<head>
    <title> Box Model Design </title>

    <style>
        div {
            padding: 50px;
            margin: 80px;
            border: 30px solid rgb(167, 235, 135);
            background-color: bisque;
            width: 300px;     

            /* width : (width of content area) */
            /* height: height of context; */
            /* padding: Clears an area around the content and between Border; */
            /* margin : Clears an area outside the border. */
            /* border:   A border that goes around the padding and content */
        }


        img {
                   
                max-width: 400px;  
                height: auto;       
                border-radius: 10px;
        }
    </style>

</head>

<body>
    <h1> Box Model Design </h1>

        <img src="https://www.stockvault.net/data/2011/05/31/124348/thumb16.jpg" alt="https://www.stockvault.net/data/2011/05/31/124348/thumb16.jpg(NOT Found)" >


    <div>
        The CSS box model wraps every element: margin, border, padding, content.
    </div>
</body>

</html>
