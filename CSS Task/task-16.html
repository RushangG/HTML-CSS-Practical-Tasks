<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Positioning Elements </title>

    <style>

  
    div.relative{
        position: relative; 
        
        left: 40px;
        border : 3px solid black
    }

    div.static{
        position: static;
        border: 3px solid;
    }

    div.absolute{
        position: absolute;
        border: 3px solid rgb(205, 24, 24);
    }


    div.fixed{
        position: fixed;
        border: 3px solid rgb(35, 130, 42);
    }





      </style>

</head>
<body>

    <h1>
         Positioning Elements

    </h1>
    <br>

    <div class="relative">

        div Elements position realtive to left.
    </div>

    <br>


    <div class="static">
        static CLASS
    </div>


    <br>

    <div class="absolute">
        absolute class
    </div>

    <br>

    <div class="fixed">
        fixed class

    </div>


</body>
</html>
