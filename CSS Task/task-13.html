<!DOCTYPE html>
<html>

<head>
    <title>Document</title>

    <style>
        body {
            background-color: blanchedalmond;
        }

        .gradient-section{
            padding: 100px;
            margin: 100px;
            background-image: linear-gradient(to bottom right, red, yellow);
            height: 200px;
            width: 200px;
        }

        .img-div{
           background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url(https://www.stockvault.net/data/2011/05/31/124348/thumb16.jpg);   
            width: 300px;
            height: 300px;
            color: white;
            padding: 100px;
            margin: 100px;
            
        }
        

    </style>
</head>

<body>
    <h1> Background Styling</h1>
    

    <h3>Section : </h3>
    <section class="gradient-section">
        <h2>The background-color Property </h2>
    </section>

    
    <h3>Div : </h3>
    <div class="img-div">
        <h2>Image Background</h2>

    </div>


</body>
</html>
